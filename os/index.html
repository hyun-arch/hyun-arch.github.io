<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0c0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aram Huvis OS">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Aram Huvis OS</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">Aram Huvis <b>OS</b></div>
    <div class="gate-sub">회사 운영체제 · 사내용. 암호를 입력하세요.</div>
    <input id="gpw" type="password" placeholder="암호" autocomplete="current-password" enterkeyhint="go">
    <button id="gbtn">들어가기</button>
    <div id="gerr"></div>
  </div>
</div>
<div id="app"></div>

<script src="seed.js"></script>
<script src="app.js"></script>
<script>
// 프로토타입 게이트(가벼운 잠금). 실제 직원 로그인은 다음 단계.
const PW_HASH="bf5ef70535dc430c8819a48247ac11599debbcb26b4b3d7663fcfda75fef1f03";
async function sha256hex(s){
  const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("");
}
const gpw=document.getElementById("gpw"),gbtn=document.getElementById("gbtn"),gerr=document.getElementById("gerr");
function enter(){
  document.getElementById("gate").style.display="none";
  document.getElementById("app").style.display="block";
  sessionStorage.setItem("ahos.ok","1");
  (function boot(){ if(window.__bootApp) window.__bootApp(); else setTimeout(boot,30); })();
}
async function tryEnter(){
  gerr.textContent="";
  if(await sha256hex(gpw.value)===PW_HASH) enter();
  else { gerr.textContent="암호가 맞지 않습니다."; gpw.select(); }
}
gbtn.onclick=tryEnter;
gpw.addEventListener("keydown",e=>{ if(e.key==="Enter") tryEnter(); });
if(sessionStorage.getItem("ahos.ok")==="1") enter(); else gpw.focus();

if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Aram Huvis OS</title>
<style>
  :root{--bg:#0d1014;--panel:#141a21;--line:#232c37;--ink:#e8edf2;--dim:#8b98a8;--acc:#5eb3b3;--acc2:#c8a15a}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",-apple-system,system-ui,sans-serif;
    -webkit-text-size-adjust:100%}
  /* --- 잠금 화면 --- */
  #gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 50% -10%,#182028,#0d1014);z-index:10;padding:24px}
  .card{width:100%;max-width:340px;text-align:center}
  .lock{font-size:34px;letter-spacing:.5px;font-weight:700}
  .lock span{color:var(--acc)}
  .sub{color:var(--dim);margin:6px 0 26px;font-size:14px}
  #pw{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--line);
    background:#0f141a;color:var(--ink);font-size:16px;outline:none}
  #pw:focus{border-color:var(--acc)}
  #go{width:100%;margin-top:12px;padding:14px;border:0;border-radius:12px;cursor:pointer;
    background:var(--acc);color:#052; font-weight:700;font-size:16px}
  #err{color:#e07a7a;min-height:20px;margin-top:12px;font-size:14px}
  /* --- 본문 --- */
  #app{display:none;min-height:100%}
  #sidebar{position:fixed;top:0;left:0;bottom:0;width:250px;background:var(--panel);
    border-right:1px solid var(--line);padding:26px 20px;overflow:auto}
  .brand{font-size:22px;font-weight:800}
  .brand span{color:var(--acc);margin-left:6px}
  .brand-sub{color:var(--dim);font-size:12px;margin-top:2px;margin-bottom:22px}
  nav{display:flex;flex-direction:column;gap:2px}
  .navlink{color:var(--dim);text-decoration:none;padding:9px 12px;border-radius:8px;font-size:14px}
  .navlink:hover{background:#1b232c;color:var(--ink)}
  .foot{margin-top:26px;padding-top:16px;border-top:1px solid var(--line);
    color:var(--acc2);font-size:12px;letter-spacing:.3px}
  #content{margin-left:250px;padding:48px 6vw 120px;max-width:900px}
  .doc{margin-bottom:64px}
  .doc-tag{display:inline-block;font-size:12px;color:var(--acc);border:1px solid var(--line);
    padding:3px 10px;border-radius:999px;margin-bottom:18px;letter-spacing:.5px}
  .doc h1{font-size:30px;margin:.2em 0 .5em;line-height:1.25}
  .doc h2{font-size:21px;margin:1.6em 0 .6em;padding-bottom:.3em;border-bottom:1px solid var(--line)}
  .doc h3{font-size:17px;color:var(--acc);margin:1.3em 0 .4em}
  .doc p,.doc li{line-height:1.75;color:#d3dbe4}
  .doc strong{color:#fff}
  .doc blockquote{margin:1em 0;padding:.6em 1em;border-left:3px solid var(--acc);
    background:#121820;color:var(--dim);border-radius:0 8px 8px 0}
  .doc code{background:#1b232c;padding:2px 6px;border-radius:6px;font-size:.9em}
  .doc pre{background:#0f141a;border:1px solid var(--line);padding:16px;border-radius:10px;
    overflow:auto;line-height:1.6}
  .doc pre code{background:none;padding:0}
  .doc table{border-collapse:collapse;width:100%;margin:1em 0}
  .doc th,.doc td{border:1px solid var(--line);padding:8px 12px;text-align:left}
  .doc th{background:#1b232c}
  .doc hr{border:0;border-top:1px solid var(--line);margin:2em 0}
  .doc a{color:var(--acc)}
  @media(max-width:760px){
    #sidebar{position:static;width:auto;border-right:0;border-bottom:1px solid var(--line)}
    nav{flex-flow:row wrap}.navlink{padding:7px 10px}
    #content{margin-left:0;padding:28px 20px 100px}
    .foot{display:none}
  }
</style>
</head>
<body>
<div id="gate">
  <div class="card">
    <div class="lock">Aram Huvis <span>OS</span></div>
    <div class="sub">사내 자료입니다. 암호를 입력하세요.</div>
    <input id="pw" type="password" placeholder="암호" autocomplete="current-password" enterkeyhint="go">
    <button id="go">열기</button>
    <div id="err"></div>
  </div>
</div>
<div id="app"></div>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pw){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b64(DATA.salt),iterations:DATA.it,hash:"SHA-256"},
    base,{name:"AES-GCM",length:256},false,["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(DATA.iv)},key,b64(DATA.ct));
  return new TextDecoder().decode(plain);
}
const pw=document.getElementById("pw"),err=document.getElementById("err"),go=document.getElementById("go");
async function attempt(){
  err.textContent="";go.disabled=true;go.textContent="여는 중…";
  try{
    const html=await unlock(pw.value);
    document.getElementById("app").innerHTML=html;
    document.getElementById("gate").style.display="none";
    document.getElementById("app").style.display="block";
  }catch(e){
    err.textContent="암호가 맞지 않습니다.";go.disabled=false;go.textContent="열기";pw.select();
  }
}
go.onclick=attempt;
pw.addEventListener("keydown",e=>{if(e.key==="Enter")attempt();});
pw.focus();
</script>
